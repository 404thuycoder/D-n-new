<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cổng thanh toán — WanderViệt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global-tokens.css?v=3" />
  <link rel="stylesheet" href="styles.css?v=3" />
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Be Vietnam Pro', sans-serif; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; overflow: hidden; }
    
    .gateway-bg { position: absolute; inset: 0; background: radial-gradient(circle at 50% -20%, rgba(99,102,241,0.15) 0%, transparent 60%), radial-gradient(circle at 100% 100%, rgba(20,184,166,0.1) 0%, transparent 50%); z-index: 0; }
    
    .payment-card { position: relative; z-index: 1; background: rgba(30,41,59,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
    
    .wv-brand { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .wv-brand span { color: #6366f1; }
    
    .loader-ring { display: inline-block; width: 64px; height: 64px; border: 4px solid rgba(99,102,241,0.2); border-radius: 50%; border-top-color: #6366f1; animation: spin 1s ease-in-out infinite; margin-bottom: 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .success-icon { display: none; width: 64px; height: 64px; background: #10b981; border-radius: 50%; margin: 0 auto 1.5rem; color: white; font-size: 2rem; line-height: 64px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    
    .pm-title { font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .pm-desc { font-size: 0.95rem; color: #94a3b8; margin-bottom: 1.5rem; }
    
    .bill-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; text-align: left; }
    .bill-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .bill-row.total { font-size: 1.2rem; font-weight: 800; color: #fbbf24; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 0.75rem; margin-top: 0.5rem; margin-bottom: 0; }
    
    .qr-mock { display: none; margin: 1.5rem auto; width: 200px; height: 200px; background: white; border-radius: 12px; padding: 1rem; align-items: center; justify-content: center; }
    .qr-mock img { max-width: 100%; display: block; opacity: 0.8; }
    
    .btn-action { display: block; width: 100%; padding: 1rem; border-radius: 12px; font-weight: 700; font-size: 1.05rem; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-pay { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; margin-bottom: 0.75rem; display: none; }
    .btn-pay:hover { box-shadow: 0 10px 20px rgba(99,102,241,0.3); transform: translateY(-2px); }
    .btn-cancel { background: transparent; color: #94a3b8; }
    .btn-cancel:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="gateway-bg"></div>
  <div class="payment-card">
    <div class="wv-brand">◈ Wander<span>Pay</span></div>
    
    <div id="loader" class="loader-ring"></div>
    <div id="success" class="success-icon">✓</div>
    
    <h1 class="pm-title" id="pm-title">Đang kết nối...</h1>
    <p class="pm-desc" id="pm-desc">Vui lòng chờ trong giây lát</p>
    
    <div class="bill-box" id="bill-box" style="display: none;">
      <div class="bill-row">
        <span style="color:#94a3b8">Mã đơn:</span>
        <span id="bill-id" style="font-weight:600;color:#fff">...</span>
      </div>
      <div class="bill-row">
        <span style="color:#94a3b8">Dịch vụ:</span>
        <span id="bill-name" style="font-weight:600;color:#fff">...</span>
      </div>
      <div class="bill-row total">
        <span>Tổng thanh toán:</span>
        <span id="bill-amount">...</span>
      </div>
    </div>
    
    <div class="qr-mock" id="qr-mock">
      <!-- Mock QR code pattern -->
      <svg viewBox="0 0 100 100" fill="#0f172a">
        <rect x="0" y="0" width="100" height="100" fill="white" rx="5" />
        <path d="M10,10 h25 v25 h-25 z M15,15 h15 v15 h-15 z M65,10 h25 v25 h-25 z M70,15 h15 v15 h-15 z M10,65 h25 v25 h-25 z M15,70 h15 v15 h-15 z M45,45 h10 v10 h-10 z M10,45 h25 v10 h-25 z M65,45 h25 v10 h-25 z M45,10 h10 v25 h-10 z M45,65 h10 v25 h-10 z" />
      </svg>
    </div>
    
    <button class="btn-action btn-pay" id="btn-pay">XÁC NHẬN THANH TOÁN MÔ PHỎNG</button>
    <button class="btn-action btn-cancel" id="btn-cancel" onclick="window.history.back()">Quay lại / Hủy</button>
  </div>

  <script src="SharedUI.js?v=4"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const bookingId = urlParams.get('pay');
      const token = localStorage.getItem('wander_token');
      
      const elTitle = document.getElementById('pm-title');
      const elDesc = document.getElementById('pm-desc');
      const elLoader = document.getElementById('loader');
      const elSuccess = document.getElementById('success');
      const elBillBox = document.getElementById('bill-box');
      const elQrMock = document.getElementById('qr-mock');
      const btnPay = document.getElementById('btn-pay');
      const btnCancel = document.getElementById('btn-cancel');

      if (!token) {
        elLoader.style.display = 'none';
        elTitle.textContent = 'Phiên đăng nhập hết hạn';
        elDesc.textContent = 'Vui lòng đăng nhập lại để tiếp tục';
        return;
      }

      if (!bookingId) {
        elLoader.style.display = 'none';
        elTitle.textContent = 'Thiếu mã đơn';
        elDesc.textContent = 'Không tìm thấy thông tin thanh toán';
        return;
      }

      // Fetch booking detail
      fetch('/api/bookings/my', { headers: { 'x-auth-token': token } })
        .then(res => res.json())
        .then(json => {
          if (!json.success) throw new Error(json.message);
          const booking = json.data.find(b => b.bookingId === bookingId);
          if (!booking) throw new Error('Không tìm thấy đơn hàng này của bạn');
          if (booking.paymentStatus === 'paid') throw new Error('Đơn hàng đã được thanh toán từ trước');

          // Hiển thị thông tin
          elLoader.style.display = 'none';
          elBillBox.style.display = 'block';
          
          let pmName = "Cổng thanh toán";
          if (booking.paymentMethod === 'momo') { pmName = "Ví MoMo"; elQrMock.style.display = 'flex'; }
          else if (booking.paymentMethod === 'zalopay') { pmName = "ZaloPay"; elQrMock.style.display = 'flex'; }
          else if (booking.paymentMethod === 'transfer') { pmName = "Chuyển khoản Ngân hàng"; elQrMock.style.display = 'flex'; }

          elTitle.textContent = 'Thanh toán qua ' + pmName;
          elDesc.textContent = 'Quét mã QR bằng ứng dụng để thanh toán';
          
          document.getElementById('bill-id').textContent = booking.bookingId;
          document.getElementById('bill-name').textContent = booking.placeName;
          document.getElementById('bill-amount').textContent = booking.totalPrice.toLocaleString('vi-VN') + ' ₫';
          
          btnPay.style.display = 'block';
          
          btnPay.onclick = function() {
            btnPay.disabled = true;
            btnPay.textContent = 'Đang xử lý...';
            
            fetch('/api/payments/pay-booking', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
              body: JSON.stringify({ bookingId: booking.bookingId })
            })
            .then(r => r.json())
            .then(resJson => {
              if (resJson.success) {
                elBillBox.style.display = 'none';
                elQrMock.style.display = 'none';
                btnPay.style.display = 'none';
                btnCancel.style.display = 'none';
                elTitle.textContent = 'Thanh toán thành công!';
                elDesc.textContent = 'Đang chuyển hướng về lịch trình của bạn...';
                elSuccess.style.display = 'block';
                
                setTimeout(() => {
                  window.location.href = 'my-trips.html';
                }, 2000);
              } else {
                throw new Error(resJson.message);
              }
            })
            .catch(err => {
              btnPay.disabled = false;
              btnPay.textContent = 'Thử lại';
              WanderUI.showToast(err.message, 'error');
            });
          };

        })
        .catch(err => {
          elLoader.style.display = 'none';
          elTitle.textContent = 'Đã có lỗi xảy ra';
          elDesc.textContent = err.message;
        });
    });
  </script>
</body>
</html>
